services:
  postgres:
    image: postgres:16-alpine
    container_name: app-external-mfa
    restart: unless-stopped
    environment:
      POSTGRES_USER: mfa_user
      POSTGRES_PASSWORD: mfa_password
      POSTGRES_DB: mfa
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfa -d mfa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
